name: CI
on:
  pull_request:
  push:
    branches:
      - master
    tags: '*'
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
        os:
          - ubuntu-latest
          - windows-latest
          - macOS-15-intel
        arch:
          - x64
        include:
          - os: macOS-latest
            arch: aarch64
            version: 'min'
          - os: macOS-latest
            arch: aarch64
            version: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
        if: runner.os == 'macOS'
      - uses: codecov/codecov-action@v7
        if: runner.os == 'macOS'
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
  bindings:
    name: LibAccelerate bindings up to date
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - name: Regenerate bindings and check for drift
        run: |
          julia --project=gen -e 'using Pkg; Pkg.instantiate()'
          julia --project=gen gen/generate.jl
          git diff --exit-code -- src/lib/LibAccelerate.jl \
            || (echo "::error::src/lib/LibAccelerate.jl is out of date with the SDK headers. Run 'julia --project=gen gen/generate.jl' and commit the result." && exit 1)
      - name: Binding coverage (informational)
        run: julia --project=. gen/coverage.jl
  docs:
    name: Documentation
    runs-on: macOS-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - name: Install dependencies
        run: julia --project=docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs/ docs/make.jl
